name: Update latest YouTube message

on:
  schedule:
    - cron: '17 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-latest-message:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Fetch latest YouTube upload
        run: python scripts/update_latest_youtube.py
      - name: Commit update when changed
        run: |
          if git diff --quiet -- mensajes.html; then
            echo "Latest YouTube fallback video ID is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mensajes.html
          git commit -m "chore: update latest YouTube message"
          git push
